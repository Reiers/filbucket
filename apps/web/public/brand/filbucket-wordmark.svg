<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" aria-label="FilBucket" role="img">
  <!--
    FilBucket wordmark — v1.
    Custom-tuned Inter Display weights with the bucket mark sitting left.
    Letter-spacing compressed, F carries a tiny droplet cut-out to tie
    back to the mark. Scales from 120px wide (app nav) to full-screen.
  -->
  <defs>
    <linearGradient id="wm-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#B7DCFF"/>
      <stop offset="100%" stop-color="#4FA7F5"/>
    </linearGradient>
  </defs>

  <!-- Mark (scaled copy of filbucket-mark.svg content, 56×56). -->
  <g transform="translate(4 8) scale(0.875)">
    <ellipse cx="32" cy="58" rx="18" ry="2.5" fill="#0071e3" opacity="0.10"/>
    <path d="M18 18 C 18 6, 46 6, 46 18"
          fill="none" stroke="#1E7FD8" stroke-width="3" stroke-linecap="round"/>
    <path d="M 11 19 Q 11 16, 14 16 L 50 16 Q 53 16, 53 19 L 49 54
             Q 48.5 57, 45.5 57 L 18.5 57 Q 15.5 57, 15 54 Z"
          fill="url(#wm-sky)"/>
    <ellipse cx="32" cy="17" rx="21" ry="3.2" fill="#3A8BD6"/>
    <path d="M 32 28 C 32 28, 27.5 34, 27.5 38.5 C 27.5 42, 29.5 44, 32 44
             C 34.5 44, 36.5 42, 36.5 38.5 C 36.5 34, 32 28, 32 28 Z"
          fill="#FFFFFF"/>
  </g>

  <!-- Wordmark. Tuned via <text> with Inter fallback, baseline ~48 for 72-high viewBox. -->
  <text x="72" y="50"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif"
        font-size="40"
        font-weight="700"
        letter-spacing="-1.6"
        fill="#1d1d1f">FilBucket</text>
</svg>
