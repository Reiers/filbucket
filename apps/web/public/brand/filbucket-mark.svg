<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="FilBucket" role="img">
  <!--
    FilBucket mark — v2, iCloud-style.
    A rounded pastel bucket tile, no text glyph. Soft sky-blue gradient
    bucket body, rounded corners everywhere, one subtle highlight.
    Scales cleanly from 16px (favicon) to 256px (app icon).
  -->
  <defs>
    <!-- Sky-blue gradient (primary bucket body). -->
    <linearGradient id="fb-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#B7DCFF"/>
      <stop offset="100%" stop-color="#4FA7F5"/>
    </linearGradient>

    <!-- Deeper rim + handle. -->
    <linearGradient id="fb-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3A9CF0"/>
      <stop offset="100%" stop-color="#1E7FD8"/>
    </linearGradient>

    <!-- Inner mouth shadow — subtle, warm, not too dark. -->
    <linearGradient id="fb-mouth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1E5C9A"/>
      <stop offset="100%" stop-color="#3A8BD6"/>
    </linearGradient>

    <!-- Drop-fill (the tiny droplet inside). -->
    <linearGradient id="fb-drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EAF4FF"/>
    </linearGradient>
  </defs>

  <!-- Soft ambient shadow under the bucket, adds depth against light bg. -->
  <ellipse cx="32" cy="58" rx="18" ry="2.5" fill="#0071e3" opacity="0.10"/>

  <!-- Handle: soft arc, rounded caps, sits behind the bucket lip. -->
  <path d="M18 18 C 18 6, 46 6, 46 18"
        fill="none"
        stroke="url(#fb-rim)"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Bucket body: rounded-corner trapezoid (pail taper).
       Rounded top corners via cubic curves, rounded bottom via arcs. -->
  <path d="
      M 11 19
      Q 11 16, 14 16
      L 50 16
      Q 53 16, 53 19
      L 49 54
      Q 48.5 57, 45.5 57
      L 18.5 57
      Q 15.5 57, 15 54
      Z"
    fill="url(#fb-sky)"/>

  <!-- Subtle front highlight, upper-left quadrant only. -->
  <path d="
      M 15 22
      Q 15 19.5, 17 19
      L 27 18.5"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.55"/>

  <!-- Bucket mouth: soft ellipse with inner mouth gradient. -->
  <ellipse cx="32" cy="17" rx="21" ry="3.2" fill="url(#fb-mouth)"/>

  <!-- A single droplet inside, dead-center on the body front.
       This is the brand anchor — a tiny, perfect, centered water drop. -->
  <path d="
      M 32 28
      C 32 28, 27.5 34, 27.5 38.5
      C 27.5 42, 29.5 44, 32 44
      C 34.5 44, 36.5 42, 36.5 38.5
      C 36.5 34, 32 28, 32 28 Z"
    fill="url(#fb-drop)"/>

  <!-- Droplet highlight: tiny gloss on the upper-left. -->
  <path d="M 30 36 C 29.5 37.5, 29.5 39, 30 40"
        fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
</svg>
