<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="FilBucket">
  <defs>
    <!-- Filecoin blue — official -->
    <linearGradient id="fb-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ca7ff"/>
      <stop offset="100%" stop-color="#0072e5"/>
    </linearGradient>
  </defs>

  <!--
    Concept: the bucket IS the Filecoin blue. Silhouette only, no shading.
    The bucket's mouth is a dark ellipse — the "hole" you drop files into —
    and it carries the real Filecoin 'f' glyph on its body in negative space.
  -->

  <!-- Handle: solid stroke, matches bucket body color -->
  <path d="M16 18 C 16 4, 48 4, 48 18"
        fill="none"
        stroke="url(#fb-blue)"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Bucket body (pail profile) filled in Filecoin blue. Slight taper. -->
  <path d="M10.5 18 H 53.5 L 49.5 57 Q 49 59 47 59 H 17 Q 15 59 14.5 57 Z"
        fill="url(#fb-blue)"/>

  <!-- Bucket mouth: dark ellipse cut into the top. Depth without shading. -->
  <ellipse cx="32" cy="18" rx="21.5" ry="3.5" fill="#0a1020"/>

  <!-- Thin cyan rim highlight along the top curve, for definition at small sizes -->
  <path d="M11.5 17.5 Q 32 12.5, 52.5 17.5"
        fill="none" stroke="#a8daff" stroke-width="0.8" stroke-opacity="0.7"/>

  <!--
    Real Filecoin 'f' glyph on the bucket body, rendered in paper-white.
    Extracted verbatim from filecoin.svg, scaled + centered to sit on the front.
    Original viewBox 0..40; the glyph lives in a ~16x26 region starting around x=10,y=6.
    Transform: translate to center it on the bucket body, then scale down to ~0.7.
  -->
  <g transform="translate(22.5 31) scale(0.65)" fill="#fbf9f4">
    <path fill-rule="evenodd" clip-rule="evenodd"
          d="M21.9 17.6l-.6 3.2 5.7.8-.4 1.5-5.6-.8c-.4 1.3-.6 2.7-1.1 3.9-.5 1.4-1 2.8-1.6 4.1-.8 1.7-2.2 2.9-4.1 3.2-1.1.2-2.3.1-3.2-.6-.3-.2-.6-.6-.6-.9 0-.4.2-.9.5-1.1.2-.1.7 0 1 .1.3.3.6.7.8 1.1.6.8 1.4.9 2.2.3.9-.8 1.4-1.9 1.7-3 .6-2.4 1.2-4.7 1.7-7.1v-.4l-5.3-.8.2-1.5 5.5.8.7-3.1-5.7-.9.2-1.6 5.9.8c.2-.6.3-1.1.5-1.6.5-1.8 1-3.6 2.2-5.2 1.2-1.6 2.6-2.6 4.7-2.5.9 0 1.8.3 2.4 1 .1.1.3.3.3.5 0 .4 0 .9-.3 1.2-.4.3-.9.2-1.3-.2-.3-.3-.5-.6-.8-.9-.6-.8-1.5-.9-2.2-.2-.5.5-1 1.2-1.3 1.9-.7 2.1-1.2 4.3-1.9 6.5l5.5.8-.4 1.5-5.3-.8"/>
  </g>
</svg>
