<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="FilBucket">
  <defs>
    <linearGradient id="fb-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c85628"/>
      <stop offset="100%" stop-color="#9d3a12"/>
    </linearGradient>
    <linearGradient id="fb-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a2408"/>
      <stop offset="100%" stop-color="#3a1304"/>
    </linearGradient>
    <linearGradient id="fb-coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ba7ff"/>
      <stop offset="100%" stop-color="#0072cc"/>
    </linearGradient>
    <radialGradient id="fb-coin-gloss" cx="0.4" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Bail handle -->
  <path d="M14 18 Q 32 -2, 50 18"
        fill="none" stroke="#2a1509" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Handle pins -->
  <circle cx="14" cy="18" r="1.3" fill="#2a1509"/>
  <circle cx="50" cy="18" r="1.3" fill="#2a1509"/>

  <!-- Bucket body with gradient, no heavy outline -->
  <path d="M12 19 L 52 19 L 47 54 Q 46.5 56 44.5 56 L 19.5 56 Q 17.5 56 17 54 Z"
        fill="url(#fb-body)"/>

  <!-- Left shading stripe for subtle cylinder depth -->
  <path d="M12 19 L 17 54 Q 17.5 56 19.5 56 L 21 56 L 16 19 Z"
        fill="#2a1509" opacity="0.18"/>
  <!-- Right highlight stripe -->
  <path d="M48 19 L 52 19 L 47 54 Q 46.5 56 44.5 56 L 44 56 L 48.5 19 Z"
        fill="#ffffff" opacity="0.06"/>

  <!-- Rim opening (depth into bucket) -->
  <ellipse cx="32" cy="19" rx="20" ry="3.2" fill="url(#fb-rim)"/>
  <!-- Thin highlight on the near lip -->
  <path d="M13 18 Q 32 15, 51 18" stroke="#ffd7bd" stroke-width="0.8" fill="none" opacity="0.55"/>

  <!-- Single reinforcement hoop, subtle -->
  <path d="M14.2 33 L 49.8 33" stroke="#2a1509" stroke-width="0.8" opacity="0.28" fill="none"/>

  <!-- Filecoin medallion, integrated as a stamped front badge -->
  <g transform="translate(32 40)">
    <!-- Drop shadow under coin -->
    <ellipse cx="0" cy="8.6" rx="7.2" ry="1.2" fill="#2a1509" opacity="0.35"/>
    <!-- Coin body -->
    <circle cx="0" cy="0" r="8.2" fill="url(#fb-coin)"/>
    <!-- Gloss -->
    <circle cx="0" cy="0" r="8.2" fill="url(#fb-coin-gloss)"/>
    <!-- Rim line -->
    <circle cx="0" cy="0" r="8.2" fill="none" stroke="#003766" stroke-width="0.5" opacity="0.5"/>
    <!-- Filecoin 'f' — bumped contrast with warm off-white -->
    <g transform="translate(-6.5 -7) scale(0.5)">
      <path d="M19.8 14.8l-.5 2.7 4.9.7-.35 1.3-4.85-.7
               c-.35 1.1-.5 2.3-.95 3.35-.45 1.2-.9 2.4-1.4 3.55
               -.7 1.45-1.9 2.5-3.55 2.75-.95.15-1.95.1-2.75-.5
               -.25-.2-.5-.5-.5-.8 0-.35.2-.8.45-.95.15-.1.6 0 .85.1
               .25.2.5.6.7.95.5.7 1.2.8 1.9.25.75-.7 1.2-1.65 1.45-2.6
               .5-2.05 1.05-4.05 1.5-6.1v-.35l-4.6-.7.2-1.3 4.75.7
               .6-2.7-4.9-.75.2-1.35 5.1.7
               c.2-.55.3-.95.45-1.4.45-1.55.9-3.1 1.9-4.5 1-1.4 2.25-2.25 4.05-2.15
               .8 0 1.55.25 2.1.85.1.1.25.25.25.4 0 .35 0 .8-.25 1.05
               -.35.25-.8.2-1.15-.2-.25-.25-.45-.5-.7-.8
               -.5-.7-1.3-.8-1.9-.2-.45.45-.85 1.05-1.1 1.65
               -.6 1.8-1.05 3.7-1.65 5.6l4.75.7-.35 1.3-4.6-.7"
            fill="#ffffff"/>
    </g>
  </g>
</svg>
